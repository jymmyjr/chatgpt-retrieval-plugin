name: Python CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Upgrade Python packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Poetry on the selected Python
        run: |
          python -m pip install poetry==1.7.1
          python -m poetry --version
          python --version

      - name: Configure Poetry
        run: |
          python -m poetry env use "${pythonLocation}/bin/python"
          python -m poetry config virtualenvs.create true
          python -m poetry config virtualenvs.in-project true
          python -m poetry run python --version

      - name: Refresh Poetry lock metadata
        run: python -m poetry lock --no-update

      - name: Install dependencies
        run: python -m poetry install --with dev --no-interaction

      - name: Run unit tests
        env:
          BEARER_TOKEN: ci-placeholder-token
        run: |
          python -m poetry run pytest tests \
            --ignore=tests/datastore/providers

      - name: Validate package metadata
        run: python -m poetry check
