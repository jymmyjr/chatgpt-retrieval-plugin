name: Dependency Update Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-consolidated-update:
    name: Validate consolidated Poetry dependency update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Upgrade Python packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Poetry on the selected Python
        run: |
          python -m pip install poetry==1.7.1
          python -m poetry --version
          python --version

      - name: Configure Poetry
        run: |
          python -m poetry env use "${pythonLocation}/bin/python"
          python -m poetry config virtualenvs.create true
          python -m poetry config virtualenvs.in-project true
          python -m poetry run python --version

      - name: Refresh current lock metadata
        run: python -m poetry lock --no-update

      - name: Install current dependencies
        run: python -m poetry install --with dev --no-interaction

      - name: Validate current project metadata
        run: python -m poetry check

      - name: Run current unit tests before update
        env:
          BEARER_TOKEN: ci-placeholder-token
          DATASTORE: chroma
        run: |
          mapfile -t test_files < <(find tests -type f -name 'test_*.py' ! -path 'tests/datastore/providers/*' | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No standalone unit tests found after excluding external datastore provider tests. Skipping pytest successfully."
            exit 0
          fi
          python -m poetry run pytest "${test_files[@]}"

      - name: Apply consolidated security dependency update without committing
        run: python -m poetry update lxml python-dotenv gitpython

      - name: Refresh updated lock metadata
        run: python -m poetry lock --no-update

      - name: Install updated dependencies
        run: python -m poetry install --with dev --no-interaction

      - name: Validate project metadata after update
        run: python -m poetry check

      - name: Run unit tests after update
        env:
          BEARER_TOKEN: ci-placeholder-token
          DATASTORE: chroma
        run: |
          mapfile -t test_files < <(find tests -type f -name 'test_*.py' ! -path 'tests/datastore/providers/*' | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No standalone unit tests found after excluding external datastore provider tests. Skipping pytest successfully."
            exit 0
          fi
          python -m poetry run pytest "${test_files[@]}"

      - name: Generate dependency update diff artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "Git status:"
            git status --short
            echo
            echo "Dependency diff:"
            git diff -- pyproject.toml poetry.lock || true
          } > dependency-update-diff.txt

      - name: Upload dependency update diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-diff
          path: dependency-update-diff.txt
          if-no-files-found: error
          retention-days: 14
