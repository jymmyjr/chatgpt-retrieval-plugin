name: Dependency Update Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-consolidated-update:
    name: Validate consolidated Poetry dependency update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true

      - name: Install current dependencies
        run: |
          poetry install --with dev

      - name: Validate current project metadata
        run: |
          poetry check

      - name: Run current tests before update
        run: |
          poetry run pytest

      - name: Apply consolidated security dependency update without committing
        run: |
          poetry update lxml python-dotenv gitpython

      - name: Validate project metadata after update
        run: |
          poetry check

      - name: Run tests after update
        run: |
          poetry run pytest

      - name: Generate dependency update diff artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "Git status:"
            git status --short
            echo
            echo "Dependency diff:"
            git diff -- pyproject.toml poetry.lock || true
          } > dependency-update-diff.txt

      - name: Upload dependency update diff
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-update-diff
          path: dependency-update-diff.txt
          if-no-files-found: error
          retention-days: 14
          archive: false
