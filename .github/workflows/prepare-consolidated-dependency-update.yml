name: Prepare Consolidated Dependency Update

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-consolidated-update:
    name: Prepare consolidated Poetry dependency update PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Upgrade Python packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Poetry on the selected Python
        run: |
          python -m pip install poetry==1.7.1
          python -m poetry --version
          python --version

      - name: Configure Poetry
        run: |
          python -m poetry env use "${pythonLocation}/bin/python"
          python -m poetry config virtualenvs.create true
          python -m poetry config virtualenvs.in-project true
          python -m poetry run python --version

      - name: Refresh current lock metadata
        run: python -m poetry lock --no-update

      - name: Install current dependencies
        run: python -m poetry install --with dev --no-interaction

      - name: Validate current project metadata
        run: python -m poetry check

      - name: Run current unit tests before update
        env:
          BEARER_TOKEN: ci-placeholder-token
          DATASTORE: chroma
        run: |
          mapfile -t test_files < <(find tests -type f -name 'test_*.py' ! -path 'tests/datastore/providers/*' | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No standalone unit tests found after excluding external datastore provider tests. Skipping pytest successfully."
            exit 0
          fi
          python -m poetry run pytest "${test_files[@]}"

      - name: Apply consolidated dependency update
        run: python -m poetry update lxml python-dotenv gitpython

      - name: Refresh updated lock metadata
        run: python -m poetry lock --no-update

      - name: Install updated dependencies
        run: python -m poetry install --with dev --no-interaction

      - name: Validate project metadata after update
        run: python -m poetry check

      - name: Run unit tests after update
        env:
          BEARER_TOKEN: ci-placeholder-token
          DATASTORE: chroma
        run: |
          mapfile -t test_files < <(find tests -type f -name 'test_*.py' ! -path 'tests/datastore/providers/*' | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No standalone unit tests found after excluding external datastore provider tests. Skipping pytest successfully."
            exit 0
          fi
          python -m poetry run pytest "${test_files[@]}"

      - name: Stop if no dependency diff exists
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pyproject.toml poetry.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency diff detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dependency diff detected."
          fi

      - name: Generate dependency update diff artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "Git status:"
            git status --short
            echo
            echo "Dependency diff:"
            git diff -- pyproject.toml poetry.lock || true
          } > dependency-update-diff.txt

      - name: Upload dependency update diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-diff
          path: dependency-update-diff.txt
          if-no-files-found: error
          retention-days: 14

      - name: Configure Git author
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create consolidated update branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git checkout -B chore/consolidated-poetry-security-update
          git add pyproject.toml poetry.lock
          git commit -m "chore: consolidate Poetry security dependency updates"
          git push --force-with-lease origin chore/consolidated-poetry-security-update

      - name: Create or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          body_file="/tmp/consolidated-dependency-update-body.md"
          cat > "$body_file" <<'EOF'
          ## Summary

          Consolidated Poetry dependency update for the currently open dependency update targets:

          - lxml
          - python-dotenv
          - gitpython

          ## Validation performed by workflow

          - python -m poetry lock --no-update before install
          - python -m poetry install --with dev --no-interaction
          - python -m poetry check before update
          - unit tests before update, excluding external datastore provider integration tests
          - python -m poetry update lxml python-dotenv gitpython
          - python -m poetry lock --no-update after update
          - python -m poetry check after update
          - unit tests after update, excluding external datastore provider integration tests

          ## Governance

          This PR supersedes the individual dependency PRs if CI passes and the dependency diff is reviewed.

          Do not merge without reviewing `dependency-update-diff.txt` from the workflow artifact and confirming no secrets or unsafe config changes were introduced.
          EOF

          if gh pr view chore/consolidated-poetry-security-update --json number --jq .number >/tmp/pr-number.txt 2>/dev/null; then
            pr_number="$(cat /tmp/pr-number.txt)"
            gh pr edit "$pr_number" \
              --title "Consolidate Poetry security dependency updates" \
              --body-file "$body_file"
            echo "Updated existing PR #$pr_number"
          else
            gh pr create \
              --base main \
              --head chore/consolidated-poetry-security-update \
              --title "Consolidate Poetry security dependency updates" \
              --body-file "$body_file"
          fi
